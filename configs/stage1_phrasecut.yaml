# Stage 1: single-object text-prompted segmentation on PhraseCut.
# Image + phrase -> one binary mask.

model_config: configs/model.yaml

data:
  manifest: datasets/manifest_stage1.jsonl   # produced by `textsam-prepare --stage 1`
  image_size: 1024
  subsample_per_image: 1        # one random phrase per image per epoch (was: all ~310k)
  augmentations:
    flip_horizontal: 0.5
    color_jitter: 0.2
    random_resized_crop: [0.7, 1.0]

train:
  epochs: 12
  batch_size: 8
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  grad_accum_steps: 1
  amp_dtype: bfloat16
  grad_checkpointing: false
  loss_size: 256                # compute loss at decoder's native res; skips 256->1024 upsample
  channels_last: true           # fuses conv kernels (patch_embed, neck, mask decoder convs)
  compile: true                 # torch.compile the adapter
  compile_decoder: true         # also the mask decoder (shape-stable, safe)
  compile_encoder: true         # SAM encoder is frozen + fixed shape -> CUDA-graph friendly
  optimizer:
    name: adamw
    weight_decay: 0.05
    lr_adapter: 1.0e-4
    lr_decoder: 1.0e-5
  scheduler:
    name: cosine
    warmup_iters: 1000
    min_lr_ratio: 0.01

loss:
  dice_weight: 0.5
  focal_weight: 0.5
  focal_alpha: 0.25
  focal_gamma: 2.0
  iou_weight: 0.05

eval:
  every_n_epochs: 3            # was 1 — full PhraseCut val is expensive; sample less often
  metric: miou

logging:
  log_dir: runs/stage1
  ckpt_dir: checkpoints/stage1
  save_every_n_epochs: 2       # named epoch_NNN.pt, kept up to `keep_last`
  save_every_n_steps: 2000     # also overwrite `last.pt` mid-epoch; 0 disables
  keep_last: 3
